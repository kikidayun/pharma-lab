<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>제약 작용기 카드 선택</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #f5f0ff;
      --bg-card: #fffaf6;
      --bg-panel: #ffffffcc;
      --primary: #7b4bda;
      --primary-soft: #d2c1ff;
      --accent: #ffb347;
      --text-main: #333;
      --card-border: #d5c4ff;
      --must: #ffd25a;
      --bonus: #6fd5ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Gowun Dodum", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 212, 235, .8) 0 12%, transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(215, 203, 255, .9) 0 13%, transparent 30%),
        radial-gradient(circle at 78% 88%, rgba(196, 238, 255, .8) 0 12%, transparent 30%),
        linear-gradient(135deg, #fff4fb 0%, #f5f0ff 45%, #eef8ff 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,247,253,.9));
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(60, 30, 100, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.7);
      padding: 16px 18px;
      backdrop-filter: blur(8px);
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(123, 75, 218, 0.15);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 1.4rem;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
    }

    header h1::before {
      content: "🔮";
      font-size: 1.5rem;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 0.95rem;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 99px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .badge.score {
      background: #ffe6c4;
      color: #b45b00;
    }

    .badge small {
      font-weight: 400;
      margin-right: 4px;
      opacity: 0.8;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-panel);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 10px 20px rgba(80, 40, 150, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .section-title {
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 0.95rem;
    }

    .section-title .emoji { font-size: 1.1rem; }

    .helper-text {
      font-size: 0.8rem;
      color: #777;
      margin-top: 2px;
    }

    .cards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    @media (max-width: 700px) {
      .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      padding: 8px;
      background: radial-gradient(circle at top, #fff8e7, var(--bg-card));
      border: 1px solid var(--card-border);
      box-shadow: 0 4px 10px rgba(80, 40, 150, 0.16), 0 0 0 1px rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, filter 0.18s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(80, 40, 150, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.95);
      filter: brightness(1.03);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .card-inner img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #666;
      z-index: 2;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }

    .card.selected-must {
      border-color: var(--must);
      box-shadow: 0 0 16px rgba(255, 210, 90, 0.85), 0 0 0 2px rgba(255, 255, 255, 1);
      transform: translateY(-4px) scale(1.02);
    }

    .card.selected-bonus {
      border-color: var(--bonus);
      box-shadow: 0 0 14px rgba(111, 213, 255, 0.8), 0 0 0 2px rgba(255, 255, 255, 1);
      transform: translateY(-4px) scale(1.02);
    }

    .card.selected-must .card-badge {
      background: var(--must);
      color: #5b3a00;
      font-weight: 800;
    }

    .card.selected-bonus .card-badge {
      background: var(--bonus);
      color: #004b68;
      font-weight: 800;
    }

    .mode-toggle {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid rgba(123, 75, 218, 0.4);
      overflow: hidden;
      font-size: 0.8rem;
    }

    .mode-btn {
      padding: 4px 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
      color: #666;
    }

    .mode-btn.active {
      background: var(--primary);
      color: #fff;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease, background 0.12s ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: none;
      filter: brightness(0.97);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      filter: grayscale(0.25);
    }

    .btn-main {
      background: linear-gradient(135deg, #7b4bda, #c173ff);
      color: white;
      box-shadow: 0 6px 12px rgba(123, 75, 218, 0.35);
    }

    .btn-sub {
      background: #ffffff;
      color: #555;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(230, 230, 255, 0.9);
    }

    .btn-ghost {
      background: transparent;
      color: #555;
      border: 1px dashed rgba(120, 120, 160, 0.5);
      box-shadow: none;
    }

    .score-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-self: start;
    }

    .score-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .score-row input[type="number"] {
      width: 78px;
      padding: 7px 8px;
      border-radius: 999px;
      border: 1px solid rgba(123, 75, 218, 0.4);
      font-size: 0.9rem;
      text-align: center;
      outline: none;
    }

    .score-row input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(123, 75, 218, 0.18);
    }

    .actions {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }

    .warning {
      color: #b23b00;
      font-size: 0.8rem;
      margin-top: 6px;
    }

    .fullscreen-view {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 30, 0.92);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px 44px;
    }

    .fullscreen-view.active {
      display: flex;
    }

    .fullscreen-content {
      width: min(1160px, 100%);
    }

    .fullscreen-title {
      color: #fff;
      text-align: center;
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .fullscreen-section {
      position: relative;
      border-radius: 20px;
      padding: 34px 18px 22px;
      margin-bottom: 26px;
      border: 2px solid transparent;
      overflow: visible;
    }

    .fullscreen-section.must-section {
      background: radial-gradient(circle at center, rgba(255,210,90,.26), rgba(255,210,90,.08) 44%, rgba(255,210,90,0) 72%);
      border-color: rgba(255,210,90,.65);
      box-shadow: 0 0 28px rgba(255,210,90,.28), inset 0 0 30px rgba(255,210,90,.12);
    }

    .fullscreen-section.bonus-section {
      background: radial-gradient(circle at center, rgba(111,213,255,.18), rgba(111,213,255,.06) 45%, rgba(111,213,255,0) 72%);
      border-color: rgba(111,213,255,.48);
      box-shadow: 0 0 20px rgba(111,213,255,.16), inset 0 0 22px rgba(111,213,255,.08);
    }

    .fullscreen-section-label {
      position: absolute;
      left: 22px;
      top: -18px;
      padding: 8px 22px;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 900;
      box-shadow: 0 6px 16px rgba(0,0,0,.22);
      z-index: 10;
      white-space: nowrap;
    }

    .fullscreen-section-label.must {
      background: var(--must);
      color: #5b3a00;
    }

    .fullscreen-section-label.bonus {
      background: var(--bonus);
      color: #004b68;
    }

    .fullscreen-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 18px;
      min-height: 220px;
      align-items: center;
      justify-content: center;
    }

    .fullscreen-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 14px;
      overflow: visible;
      background: #fff;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fullscreen-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 14px;
      display: block;
      background: #fff;
    }

    .fullscreen-card.empty {
      opacity: .16;
      border: 2px dashed rgba(255,255,255,.7);
      background: rgba(255,255,255,.08);
      box-shadow: none;
    }

    .fullscreen-card.must-card {
      box-shadow:
        0 0 0 4px rgba(255,255,255,.95),
        0 0 0 8px rgba(255,210,90,.85),
        0 0 35px 12px rgba(255,210,90,.78),
        0 18px 35px rgba(0,0,0,.45);
      animation: mustGlow 1.8s ease-in-out infinite alternate;
    }

    .fullscreen-card.bonus-card {
      box-shadow:
        0 0 0 4px rgba(255,255,255,.95),
        0 0 0 7px rgba(111,213,255,.8),
        0 0 26px 8px rgba(111,213,255,.6),
        0 18px 35px rgba(0,0,0,.42);
    }

    @keyframes mustGlow {
      from {
        filter: brightness(1);
        transform: translateY(0);
      }
      to {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }
    }

    .fullscreen-label {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 900;
      z-index: 2;
      box-shadow: 0 4px 10px rgba(0,0,0,.18);
    }

    .fullscreen-label.must {
      background: var(--must);
      color: #5b3a00;
    }

    .fullscreen-label.bonus {
      background: var(--bonus);
      color: #004b68;
    }

    .close-fullscreen {
      position: fixed;
      top: 18px;
      right: 24px;
      font-size: 2rem;
      background: white;
      color: #333;
      width: 46px;
      height: 46px;
      justify-content: center;
      padding: 0;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }


  
    .app {
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "✦  ✧  ✦";
      position: absolute;
      right: 24px;
      bottom: 18px;
      color: rgba(123, 75, 218, .12);
      font-size: 3rem;
      font-weight: 900;
      pointer-events: none;
    }

    .panel {
      border: 1px solid rgba(219, 198, 255, .85);
    }

    header h1 {
      font-weight: 900;
      letter-spacing: -0.03em;
      text-shadow: 0 2px 0 rgba(255,255,255,.9);
    }

    .badge {
      box-shadow: inset 0 -2px 0 rgba(255,255,255,.55), 0 4px 10px rgba(123,75,218,.12);
    }

    .cards-grid {
      gap: 12px;
    }

    .card {
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fff9fd);
    }

    .card img {
      filter: saturate(1.05);
    }

    .card-badge {
      font-size: .75rem;
      padding: 4px 10px;
    }

    .score-panel {
      width: 100%;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(250,243,255,.92));
    }

    .score-panel > div {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "title controls";
      align-items: center;
      gap: 14px;
    }

    .score-panel .section-title {
      grid-area: title;
      margin-bottom: 0;
      font-size: 1rem;
      white-space: nowrap;
    }

    .score-row {
      margin-top: 0;
    }

    .score-panel .actions,
    .score-panel .score-row {
      display: flex;
      flex-direction: row;
      align-items: center;
    }

    .score-panel .score-row {
      gap: 8px;
      white-space: nowrap;
    }

    .score-panel .actions {
      margin-top: 0;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .score-panel .score-row,
    .score-panel .actions {
      grid-area: controls;
    }

    .score-panel .score-row {
      justify-self: start;
    }

    .score-panel .actions {
      justify-self: end;
      padding-left: 230px;
    }

    .score-row input[type="number"] {
      background: #fff;
      border: 2px solid rgba(193, 160, 255, .55);
      box-shadow: inset 0 2px 5px rgba(123,75,218,.06);
    }

    .btn-main {
      background: linear-gradient(135deg, #8d5cff, #d467ff);
      box-shadow: 0 7px 14px rgba(141, 92, 255, .28);
    }

    .btn-sub, .btn-ghost {
      background: rgba(255,255,255,.82);
      border: 2px solid rgba(219, 198, 255, .8);
      color: #5d5170;
    }

    .btn-ghost {
      border-style: dashed;
    }

    @media (max-width: 900px) {
      .score-panel > div {
        grid-template-columns: 1fr;
        grid-template-areas:
          "title"
          "controls";
      }

      .score-panel .score-row,
      .score-panel .actions {
        grid-area: auto;
        justify-self: stretch;
        padding-left: 0;
      }

      .score-panel .actions {
        justify-content: stretch;
      }

      .score-panel .actions button {
        flex: 1 1 160px;
      }
    }

  
    .score-inner {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .score-controls {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .score-inner .section-title {
      margin-bottom: 0;
    }

    .score-inner .score-row,
    .score-inner .actions {
      margin-top: 0;
      padding-left: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .score-inner .actions {
      justify-content: flex-end;
    }

    .score-inner .actions button {
      min-width: 160px;
    }

    #msg {
      width: 100%;
    }

    @media (max-width: 760px) {
      .score-inner,
      .score-controls,
      .score-inner .score-row,
      .score-inner .actions {
        align-items: stretch;
      }

      .score-controls {
        flex-direction: column;
      }

      .score-inner .actions button,
      .score-inner .score-row button {
        width: 100%;
      }
    }

  
    /* 전체화면 카드 줄: 보너스가 많아도 한 줄 유지 + 작은 화면에서는 가로 스크롤 */
    .fullscreen-row {
      display: grid !important;
      grid-auto-flow: column;
      grid-auto-columns: minmax(150px, 1fr);
      grid-template-columns: none !important;
      gap: 18px;
      min-height: 220px;
      align-items: center;
      justify-content: start;
      overflow-x: auto;
      overflow-y: visible;
      padding: 10px 8px 16px;
      scroll-snap-type: x proximity;
    }

    .fullscreen-row .fullscreen-card {
      min-width: 150px;
      max-width: 245px;
      width: 100%;
      scroll-snap-align: center;
    }

    .fullscreen-row::-webkit-scrollbar {
      height: 8px;
    }

    .fullscreen-row::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.35);
      border-radius: 999px;
    }

    .fullscreen-row::-webkit-scrollbar-track {
      background: rgba(255,255,255,.08);
      border-radius: 999px;
    }

    @media (min-width: 1000px) {
      .fullscreen-row {
        grid-auto-columns: minmax(170px, 1fr);
      }
    }

    @media (max-width: 850px) {
      .fullscreen-view {
        padding: 54px 14px 18px;
        overflow-y: auto;
        align-items: flex-start;
      }

      .fullscreen-row {
        grid-auto-columns: minmax(135px, 42vw);
        min-height: 190px;
      }
    }

    @media (max-width: 520px) {
      .fullscreen-title {
        font-size: 1.1rem;
      }

      .fullscreen-section {
        padding-left: 10px;
        padding-right: 10px;
      }

      .fullscreen-row {
        grid-auto-columns: minmax(120px, 62vw);
        gap: 12px;
      }
    }

  
    /* 최종 수정: 전체화면에서 선택 카드가 1~3장일 때 가운데 정렬 */
    .fullscreen-row {
      justify-content: center !important;
      justify-items: center;
      margin-left: auto;
      margin-right: auto;
      max-width: 980px;
    }

    .fullscreen-row .fullscreen-card {
      width: min(220px, 100%);
    }

    /* 보너스가 5장 이상처럼 많아질 때는 한 줄 유지 + 가로 스크롤 */
    .fullscreen-row:has(.fullscreen-card:nth-child(5)) {
      justify-content: start !important;
      max-width: 100%;
    }

    @supports not selector(:has(*)) {
      .fullscreen-row {
        justify-content: center !important;
      }
    }

  
    /* 폰트 최종 수정 */
    header h1,
    .section-title,
    .fullscreen-title,
    .fullscreen-section-label,
    .mode-btn,
    button,
    .badge,
    .card-badge,
    .fullscreen-label {
      font-family: "Jua", "Gowun Dodum", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      letter-spacing: 0.01em;
    }

    body,
    input,
    label,
    .helper-text,
    .warning {
      font-family: "Gowun Dodum", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    header h1 {
      font-size: 1.55rem;
      font-weight: 400;
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 400;
    }

    .helper-text {
      font-size: 0.86rem;
      line-height: 1.5;
    }

    button,
    .mode-btn,
    .badge,
    .card-badge,
    .fullscreen-label {
      font-weight: 400;
    }

    .score-row input[type="number"] {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      font-size: 1rem;
    }

  
    /* 모바일 전체화면 최종 수정: 카드가 화면 안에 맞게 자동 축소 */
    .fullscreen-view {
      overflow-y: auto;
      overflow-x: hidden;
    }

    .fullscreen-content {
      width: min(1160px, 100%);
      max-height: none;
    }

    .fullscreen-row {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) !important;
      grid-auto-flow: row !important;
      grid-auto-columns: unset !important;
      justify-content: center !important;
      justify-items: center !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
      gap: clamp(8px, 1.8vw, 18px);

<body>
  <div class="app">

        <div class="helper-text">필수/보너스 모드를 선택한 뒤 카드를 누르세요. 다시 누르면 해제됩니다.</div>
        <div class="cards-grid" id="cardsGrid"></div>
      </section>

      <section class="panel score-panel">
        <div class="score-inner">
          <div class="section-title">
            <span class="emoji">📊</span>
            <span>이번 문제 점수</span>
          </div>

          <div class="score-controls">
            <div class="score-row">
              <label for="scoreInput">점수</label>
              <input type="number" id="scoreInput" min="0" step="1" value="0" />
              <button class="btn-main" id="applyScoreBtn">점수 반영</button>
            </div>

            <div class="actions">
              <button class="btn-ghost" id="clearBtn">🗑 전체 선택 해제</button>
              <button class="btn-sub" id="fullscreenBtn">선택 카드 전체화면 보기</button>
              <button class="btn-ghost" id="backBtn">⬅ 이전 문제로 돌아가기</button>

  <div class="fullscreen-view" id="fullscreenView">
    <button class="close-fullscreen" id="closeFullscreenBtn">×</button>
    <div class="fullscreen-content">
      <div class="fullscreen-title">문제 <span id="fullscreenStep">1</span> / 8</div>

      <div class="fullscreen-section must-section" id="mustSection">
        <div class="fullscreen-section-label must" id="mustSectionLabel">⭐ 필수 카드</div>
        <div class="fullscreen-row" id="fullscreenMustGrid"></div>
      </div>

      <div class="fullscreen-section bonus-section" id="bonusSection">
        <div class="fullscreen-section-label bonus" id="bonusSectionLabel">🎁 보너스 카드</div>
        <div class="fullscreen-row" id="fullscreenBonusGrid"></div>
      </div>
    </div>

  <script>
    const cards = [
      { name: "극성 증가", image: "+OH.png" },
      { name: "산성 제거", image: "-COOH.png" },
      { name: "안정화", image: "+Ac.png" },
      { name: "혈중농도 안정", image: "+SR.png" },
      { name: "지용성 증가", image: "+R.png" },
      { name: "중추작용 강화", image: "+NH.png" },
      { name: "장용 코팅", image: "+Block.png" },
      { name: "독성 완화", image: "+Safe.png" }
    ];

    const MAX_MUST = 4;
    const TOTAL_STEPS = 8;

    let currentStep = 1;
    let totalScore = 0;
    let mustSelected = [];
    let bonusSelected = [];
    let currentMode = "must";
    let lastStepSnapshot = null;
    let isFinished = false;

    const cardsGrid = document.getElementById("cardsGrid");
    const currentStepSpan = document.getElementById("currentStep");
    const totalStepsSpan = document.getElementById("totalSteps");
    const totalScoreSpan = document.getElementById("totalScore");
    const scoreInput = document.getElementById("scoreInput");
    const applyScoreBtn = document.getElementById("applyScoreBtn");
    const backBtn = document.getElementById("backBtn");
    const modeMustBtn = document.getElementById("modeMustBtn");
    const modeBonusBtn = document.getElementById("modeBonusBtn");
    const msg = document.getElementById("msg");
    const clearBtn = document.getElementById("clearBtn");

    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const fullscreenView = document.getElementById("fullscreenView");
    const fullscreenMustGrid = document.getElementById("fullscreenMustGrid");
    const fullscreenBonusGrid = document.getElementById("fullscreenBonusGrid");
    const fullscreenStep = document.getElementById("fullscreenStep");
    const mustSection = document.getElementById("mustSection");
    const bonusSection = document.getElementById("bonusSection");
    const mustSectionLabel = document.getElementById("mustSectionLabel");
    const closeFullscreenBtn = document.getElementById("closeFullscreenBtn");

    totalStepsSpan.textContent = TOTAL_STEPS.toString();

    function getCardData(name) {
      return cards.find((card) => card.name === name);
    }

    function renderCards() {
      cardsGrid.innerHTML = "";
      cards.forEach((cardData) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.cardName = cardData.name;

        const inner = document.createElement("div");
        inner.className = "card-inner";

        const img = document.createElement("img");
        img.src = cardData.image;
        img.alt = cardData.name;
        img.draggable = false;

        inner.appendChild(img);
        card.appendChild(inner);

        const badge = document.createElement("div");
        badge.className = "card-badge";
        badge.textContent = "선택 안 됨";
        card.appendChild(badge);

        card.addEventListener("click", () => onCardClick(cardData.name));
        cardsGrid.appendChild(card);
      });

      updateCardVisuals();
    }

    function updateCardVisuals() {
      const cardEls = document.querySelectorAll(".card");
      cardEls.forEach((el) => {
        const name = el.dataset.cardName;
        const badge = el.querySelector(".card-badge");
        el.classList.remove("selected-must", "selected-bonus");

        if (mustSelected.includes(name)) {
          el.classList.add("selected-must");
          badge.textContent = "필수";
        } else if (bonusSelected.includes(name)) {
          el.classList.add("selected-bonus");
          badge.textContent = "보너스";
        } else {
          badge.textContent = "선택 안 됨";
        }
      });
    }

    function onCardClick(name) {
      msg.style.display = "none";

      const inMust = mustSelected.includes(name);
      const inBonus = bonusSelected.includes(name);

      if (currentMode === "must") {
        if (inMust) {
          mustSelected = mustSelected.filter((n) => n !== name);
        } else {
          if (mustSelected.length >= MAX_MUST) {
            alert("필수 카드는 최대 4장까지 선택할 수 있습니다.");
          } else {
            mustSelected.push(name);
          }
        }
        bonusSelected = bonusSelected.filter((n) => n !== name);
      } else {
        if (inBonus) {
          bonusSelected = bonusSelected.filter((n) => n !== name);
        } else {
          bonusSelected.push(name);
        }
        mustSelected = mustSelected.filter((n) => n !== name);
      }

      syncUI();
    }

    function syncUI() {
      currentStepSpan.textContent = currentStep.toString();
      totalScoreSpan.textContent = totalScore.toString();
      updateCardVisuals();

      if (isFinished) {
        applyScoreBtn.disabled = true;
        applyScoreBtn.textContent = "활동 완료";
        scoreInput.disabled = true;
      } else {
        applyScoreBtn.disabled = false;
        applyScoreBtn.textContent = "점수 반영";
        scoreInput.disabled = false;
      }
    }

    modeMustBtn.addEventListener("click", () => {
      currentMode = "must";
      modeMustBtn.classList.add("active");
      modeBonusBtn.classList.remove("active");
    });

    modeBonusBtn.addEventListener("click", () => {
      currentMode = "bonus";
      modeBonusBtn.classList.add("active");
      modeMustBtn.classList.remove("active");
    });

    applyScoreBtn.addEventListener("click", () => {
      msg.style.display = "none";

      if (isFinished) {
        msg.style.display = "block";
        msg.textContent = "8개 상황이 모두 완료되었습니다. 점수를 더 반영할 수 없습니다.";
        return;
      }

      const value = parseInt(scoreInput.value, 10);
      if (isNaN(value) || value < 0) {
        alert("0 이상의 숫자를 입력해주세요.");
        return;
      }

      if (currentStep === TOTAL_STEPS) {
        const ok = confirm("마지막 상황입니다. 점수를 반영하면 활동이 완료됩니다. 진행할까요?");
        if (!ok) return;
      }

      lastStepSnapshot = {
        step: currentStep,
        score: value,
        must: [...mustSelected],
        bonus: [...bonusSelected],
        finishedBefore: isFinished,
      };

      totalScore += value;

      if (currentStep < TOTAL_STEPS) {
        currentStep += 1;
        mustSelected = [];
        bonusSelected = [];
        scoreInput.value = "0";
      } else {
        isFinished = true;
        mustSelected = [];
        bonusSelected = [];
        scoreInput.value = "0";
        msg.style.display = "block";
        msg.textContent = "활동이 완료되었습니다! 최종 누적 점수를 확인하세요.";
      }

      syncUI();
    });

    backBtn.addEventListener("click", () => {
      if (!lastStepSnapshot) {
        msg.style.display = "block";
        msg.textContent = "되돌릴 이전 문제가 없습니다.";
        return;
      }

      msg.style.display = "none";

      // 마지막으로 반영했던 문제 상태로 정확히 복원
      currentStep = lastStepSnapshot.step;
      isFinished = lastStepSnapshot.finishedBefore || false;

      // 누적 점수에서 직전에 반영했던 점수 제거
      totalScore -= lastStepSnapshot.score;
      if (totalScore < 0) totalScore = 0;

      mustSelected = [...lastStepSnapshot.must];
      bonusSelected = [...lastStepSnapshot.bonus];
      scoreInput.value = String(lastStepSnapshot.score);

      // 같은 스냅샷을 여러 번 눌러 점수가 계속 빠지는 문제 방지
      lastStepSnapshot = null;

      syncUI();
    });

    clearBtn.addEventListener("click", () => {
      if (!mustSelected.length && !bonusSelected.length) {
        msg.style.display = "block";
        msg.textContent = "해제할 카드가 없습니다.";
        return;
      }

      if (!confirm("선택한 필수 카드와 보너스 카드를 모두 해제하시겠습니까?")) {
        return;
      }

      mustSelected = [];
      bonusSelected = [];
      msg.style.display = "none";
      syncUI();
    });

    function createFullscreenCard(cardData, type) {
      const card = document.createElement("div");
      card.className = "fullscreen-card " + (type === "must" ? "must-card" : "bonus-card");

      const img = document.createElement("img");
      img.src = cardData.image;
      img.alt = cardData.name;
      img.draggable = false;
      card.appendChild(img);

      const label = document.createElement("div");
      label.className = "fullscreen-label " + type;
      label.textContent = type === "must" ? "필수" : "보너스";
      card.appendChild(label);

      return card;
    }

    function createEmptyFullscreenCard() {
      const card = document.createElement("div");
      card.className = "fullscreen-card empty";
      return card;
    }

    function renderFullscreenCards() {
      fullscreenMustGrid.innerHTML = "";
      fullscreenBonusGrid.innerHTML = "";
      fullscreenStep.textContent = currentStep.toString();

      const selectedTotal = mustSelected.length + bonusSelected.length;
      const bonusSection = document.querySelector(".bonus-section");

      // 총 선택 카드가 4장 이하이면 한 줄로 표시
      // 예: 필수 2 + 보너스 2, 필수 3 + 보너스 1
      if (selectedTotal <= 4) {
        mustSection.style.display = "block";
        bonusSection.style.display = "none";
        mustSectionLabel.textContent = "✨ 선택 카드";

        mustSelected.forEach((name) => {
          const cardData = getCardData(name);
          if (cardData) fullscreenMustGrid.appendChild(createFullscreenCard(cardData, "must"));
        });

        bonusSelected.forEach((name) => {
          const cardData = getCardData(name);
          if (cardData) fullscreenMustGrid.appendChild(createFullscreenCard(cardData, "bonus"));
        });

        return;
      }

      // 5장 이상이면 위: 필수 / 아래: 보너스
      // 보너스가 4장을 넘어도 한 줄로 가로 스크롤 표시
      mustSection.style.display = "block";
      bonusSection.style.display = bonusSelected.length ? "block" : "none";
      mustSectionLabel.textContent = "⭐ 필수 카드";

      mustSelected.forEach((name) => {
        const cardData = getCardData(name);
        if (cardData) fullscreenMustGrid.appendChild(createFullscreenCard(cardData, "must"));
      });

      bonusSelected.forEach((name) => {
        const cardData = getCardData(name);
        if (cardData) fullscreenBonusGrid.appendChild(createFullscreenCard(cardData, "bonus"));
      });
    }

    fullscreenBtn.addEventListener("click", () => {
      renderFullscreenCards();
      fullscreenView.classList.add("active");
    });

    closeFullscreenBtn.addEventListener("click", () => {
      fullscreenView.classList.remove("active");
    });

    fullscreenView.addEventListener("click", (e) => {
      if (e.target === fullscreenView) {
        fullscreenView.classList.remove("active");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        fullscreenView.classList.remove("active");
      }
    });

    renderCards();
    syncUI();
  </script>
</body>
</html>
