<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>제약 작용기 카드 선택</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #f5f0ff;
      --bg-card: #fffaf6;
      --bg-panel: #ffffffcc;
      --primary: #7b4bda;
      --primary-soft: #d2c1ff;
      --accent: #ffb347;
      --text-main: #333;
      --card-border: #d5c4ff;
      --must: #ffd25a;
      --bonus: #6fd5ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Gowun Dodum", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 212, 235, .8) 0 12%, transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(215, 203, 255, .9) 0 13%, transparent 30%),
        radial-gradient(circle at 78% 88%, rgba(196, 238, 255, .8) 0 12%, transparent 30%),
        linear-gradient(135deg, #fff4fb 0%, #f5f0ff 45%, #eef8ff 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,247,253,.9));
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(60, 30, 100, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.7);
      padding: 16px 18px 32px;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "✦  ✧  ✦";
      position: absolute;
      right: 24px;
      bottom: 18px;
      color: rgba(123, 75, 218, .12);
      font-size: 3rem;
      font-weight: 900;
      pointer-events: none;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(123, 75, 218, 0.15);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    header h1 {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      font-size: 1.45rem;
      font-weight: 400;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      letter-spacing: -0.02em;
      text-shadow: 0 2px 0 rgba(255,255,255,.9);
    }

    header h1::before {
      content: "🔮";
      font-size: 1.4rem;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .badge {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      padding: 6px 12px;
      border-radius: 99px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 400;
      font-size: 0.95rem;
      box-shadow: inset 0 -2px 0 rgba(255,255,255,.55), 0 4px 10px rgba(123,75,218,.12);
    }

    .badge.score {
      background: #ffe6c4;
      color: #b45b00;
    }

    .badge small {
      font-weight: 400;
      margin-right: 4px;
      opacity: 0.8;
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .panel {
      background: var(--bg-panel);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 10px 20px rgba(80, 40, 150, 0.06);
      border: 1px solid rgba(219, 198, 255, .85);
    }

    .section-title {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
    }

    .section-title .emoji { font-size: 1.1rem; }

    .helper-text {
      font-size: 0.84rem;
      color: #777;
      margin-top: 2px;
      line-height: 1.5;
    }

    .cards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    /* 태블릿: 8장 한 줄 */
    @media (min-width: 481px) and (max-width: 900px) {
      .cards-grid {
        grid-template-columns: repeat(8, minmax(76px, 1fr));
        overflow-x: auto;
        padding-bottom: 6px;
        gap: 12px;
      }
    }

    /* 스마트폰: 4열 2행 */
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    }

    .card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fff9fd);
      border: 1px solid var(--card-border);
      box-shadow: 0 4px 10px rgba(80, 40, 150, 0.16), 0 0 0 1px rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, filter 0.18s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(80, 40, 150, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.95);
      filter: brightness(1.03);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .card-inner img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: saturate(1.05);
    }

    .card-badge {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      position: absolute;
      top: 5px;
      right: 5px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      padding: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.28);
      color: rgba(255,255,255,.75);
      z-index: 2;
    }

    .card.selected-must {
      border-color: var(--must);
      box-shadow: 0 0 16px rgba(255, 210, 90, 0.85), 0 0 0 2px rgba(255, 255, 255, 1);
      transform: translateY(-4px) scale(1.02);
    }

    .card.selected-bonus {
      border-color: var(--bonus);
      box-shadow: 0 0 14px rgba(111, 213, 255, 0.8), 0 0 0 2px rgba(255, 255, 255, 1);
      transform: translateY(-4px) scale(1.02);
    }

    .card.selected-must .card-badge {
      background: var(--must);
      color: #5b3a00;
    }

    .card.selected-bonus .card-badge {
      background: var(--bonus);
      color: #004b68;
    }

    .mode-toggle {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid rgba(123, 75, 218, 0.4);
      overflow: hidden;
      font-size: 0.85rem;
    }

    .mode-btn {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      padding: 5px 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 400;
      color: #666;
    }

    .mode-btn.active {
      background: var(--primary);
      color: #fff;
    }

    button {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      filter: brightness(0.97);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-main {
      background: linear-gradient(135deg, #8d5cff, #d467ff);
      color: white;
      box-shadow: 0 7px 14px rgba(141, 92, 255, .28);
    }

    .btn-sub {
      background: rgba(255,255,255,.82);
      color: #5d5170;
      border: 2px solid rgba(219, 198, 255, .8);
    }

    .btn-ghost {
      background: transparent;
      color: #5d5170;
      border: 2px dashed rgba(219, 198, 255, .8);
    }

    /* 점수 패널 */
    .score-panel {
      padding: 12px 16px;
    }

    .score-inner {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .score-controls {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .score-inner .section-title {
      margin-bottom: 0;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 0;
      white-space: nowrap;
    }

    .score-row input[type="number"] {
      width: 78px;
      padding: 7px 8px;
      border-radius: 999px;
      border: 2px solid rgba(193, 160, 255, .55);
      font-size: 1rem;
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      text-align: center;
      outline: none;
      background: #fff;
      box-shadow: inset 0 2px 5px rgba(123,75,218,.06);
    }

    .score-row input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(123, 75, 218, 0.18);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .warning {
      color: #b23b00;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 4px;
    }

    #msg { width: 100%; }

    @media (max-width: 760px) {
      .score-inner {
        flex-direction: column;
        align-items: stretch;
      }
      .score-controls {
        flex-direction: column;
        align-items: stretch;
      }
      .score-row, .actions {
        justify-content: stretch;
      }
      .score-row input[type="number"] {
        flex: 0 0 78px;
      }
      .actions button, .score-row button {
        flex: 1 1 140px;
      }
    }

    /* =====================================================
       선택 카드 인라인 섹션 (팝업 대신 페이지 하단에 표시)
       ===================================================== */
    .selected-cards-section {
      margin-top: 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(20, 16, 40, 0.96), rgba(30, 20, 55, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 40px rgba(20, 10, 60, 0.35);
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(.4,0,.2,1), opacity 0.35s ease;
    }

    .selected-cards-section.hidden {
      display: none;
    }

    .selected-cards-inner {
      padding: 22px 20px 24px;
    }

    .selected-cards-title {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      color: #fff;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 400;
      margin: 0 0 18px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .selected-section-box {
      position: relative;
      border-radius: 18px;
      padding: 32px 16px 18px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }

    .selected-section-label {
      position: absolute;
      left: 18px;
      top: -16px;
      padding: 7px 20px;
      border-radius: 999px;
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      background: #fff;
      color: #4d415f;
      box-shadow: 0 5px 14px rgba(0,0,0,.18);
      white-space: nowrap;
    }

    .selected-cards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(10px, 2vw, 20px);
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      justify-content: center;
      align-items: flex-start;
    }

    .selected-card-item {
      position: relative;
      flex: 0 0 clamp(130px, 16%, 200px);
      aspect-ratio: 3 / 4;
      border-radius: 14px;
      overflow: visible;
      background: #fff;
    }

    .selected-card-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 14px;
      display: block;
    }

    .selected-card-item.must-card {
      box-shadow:
        0 0 0 4px rgba(255,255,255,.98),
        0 0 0 9px rgba(255,210,90,.95),
        0 0 28px 9px rgba(255,210,90,.55),
        0 14px 30px rgba(0,0,0,.42);
    }

    .selected-card-item.bonus-card {
      box-shadow:
        0 0 0 4px rgba(255,255,255,.98),
        0 0 0 9px rgba(111,213,255,.95),
        0 0 28px 9px rgba(111,213,255,.48),
        0 14px 30px rgba(0,0,0,.42);
    }

    .selected-card-label {
      font-family: "Jua", "Gowun Dodum", system-ui, sans-serif;
      position: absolute;
      top: 7px;
      right: 7px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 400;
      z-index: 2;
      box-shadow: 0 3px 8px rgba(0,0,0,.2);
      white-space: nowrap;
    }

    .selected-card-label.must {
      background: var(--must);
      color: #5b3a00;
    }

    .selected-card-label.bonus {
      background: var(--bonus);
      color: #004b68;
    }

    .selected-empty-text {
      grid-column: 1 / -1;
      color: rgba(255,255,255,.55);
      font-size: 1rem;
      padding: 30px 0;
      text-align: center;
    }


    /* 반응형: 태블릿 — 선택카드 한 줄 가운데, 간격 넉넉히 */
    @media (min-width: 481px) and (max-width: 900px) {
      .selected-cards-grid {
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: center;
        gap: 32px;
        padding: 6px 12px 14px;
        max-width: 100%;
      }
      .selected-card-item {
        flex: 0 0 clamp(140px, 22vw, 200px);
      }
    }

    /* 반응형: 스마트폰 세로 — 선택카드 2열 */
    @media (max-width: 480px) {
      .selected-cards-inner { padding: 16px 12px 20px; }
      .selected-section-box { padding: 30px 10px 16px; }
      .selected-cards-grid {
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        max-width: 100%;
      }
      .selected-card-item {
        flex: 0 0 calc(50% - 6px);
        max-width: 160px;
      }
      .selected-card-label { font-size: .7rem; padding: 3px 8px; top: 5px; right: 5px; }
      .selected-section-label { font-size: .85rem; padding: 5px 14px; }
      .selected-cards-title { font-size: 1rem; margin-bottom: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>제약 작용기 카드 선택</h1>
      <div class="status">
        <div class="badge">
          <small>현재 진행</small>
          <span id="currentStep">1</span> / <span id="totalSteps">8</span>
        </div>
        <div class="badge score">
          <small>누적 점수</small>
          <span id="totalScore">0</span>점
        </div>
      </div>
    </header>

    <div class="layout">
      <!-- 카드 선택 패널 -->
      <section class="panel">
        <div class="cards-header">
          <div class="section-title">
            <span class="emoji">🃏</span>
            <span>작용기 카드 선택</span>
          </div>
          <div class="mode-toggle">
            <button class="mode-btn active" id="modeMustBtn">필수</button>
            <button class="mode-btn" id="modeBonusBtn">보너스</button>
          </div>
        </div>
        <div class="helper-text">필수/보너스 모드를 선택한 뒤 카드를 누르세요. 다시 누르면 해제됩니다.</div>
        <div class="cards-grid" id="cardsGrid"></div>
      </section>

      <!-- 점수 패널 -->
      <section class="panel score-panel">
        <div class="score-inner">
          <div class="section-title">
            <span class="emoji">📊</span>
            <span>이번 문제 점수</span>
          </div>

          <div class="score-controls">
            <div class="score-row">
              <label for="scoreInput">점수</label>
              <input type="number" id="scoreInput" min="0" step="1" value="0" />
              <button class="btn-main" id="applyScoreBtn">점수 반영</button>
            </div>

            <div class="actions">
              <button class="btn-ghost" id="clearBtn">🗑 전체 선택 해제</button>
              <button class="btn-ghost" id="backBtn">⬅ 이전 문제로 돌아가기</button>
            </div>
          </div>

          <div id="msg" class="warning" style="display:none;"></div>
        </div>
      </section>

      <!-- 선택 카드 인라인 섹션 (카드 선택 시 자동으로 표시) -->
      <section class="selected-cards-section hidden" id="selectedCardsSection">
        <div class="selected-cards-inner">
          <div class="selected-cards-title">✨ 문제 <span id="selectedStep">1</span> / 8 · 선택 카드</div>
          <div class="selected-section-box">
            <div class="selected-section-label" id="selectedSectionLabel">선택 카드</div>
            <div class="selected-cards-grid" id="selectedCardsGrid"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const cards = [
      { name: "극성 증가",     image: "+OH.png" },
      { name: "산성 제거",     image: "-COOH.png" },
      { name: "안정화",        image: "+Ac.png" },
      { name: "혈중농도 안정", image: "+SR.png" },
      { name: "지용성 증가",   image: "+R.png" },
      { name: "중추작용 강화", image: "+NH.png" },
      { name: "장용 코팅",     image: "+Block.png" },
      { name: "독성 완화",     image: "+Safe.png" }
    ];

    const MAX_MUST = 4;
    const TOTAL_STEPS = 8;

    let currentStep = 1;
    let totalScore = 0;
    let mustSelected = [];
    let bonusSelected = [];
    let currentMode = "must";
    let lastStepSnapshot = null;
    let isFinished = false;

    const cardsGrid = document.getElementById("cardsGrid");
    const currentStepSpan = document.getElementById("currentStep");
    const totalStepsSpan = document.getElementById("totalSteps");
    const totalScoreSpan = document.getElementById("totalScore");
    const scoreInput = document.getElementById("scoreInput");
    const applyScoreBtn = document.getElementById("applyScoreBtn");
    const backBtn = document.getElementById("backBtn");
    const modeMustBtn = document.getElementById("modeMustBtn");
    const modeBonusBtn = document.getElementById("modeBonusBtn");
    const msg = document.getElementById("msg");
    const clearBtn = document.getElementById("clearBtn");

    const selectedCardsSection = document.getElementById("selectedCardsSection");
    const selectedCardsGrid = document.getElementById("selectedCardsGrid");
    const selectedStep = document.getElementById("selectedStep");
    const selectedSectionLabel = document.getElementById("selectedSectionLabel");

    totalStepsSpan.textContent = TOTAL_STEPS.toString();

    function getCardData(name) {
      return cards.find((c) => c.name === name);
    }

    function renderCards() {
      cardsGrid.innerHTML = "";
      cards.forEach((cardData) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.cardName = cardData.name;

        const inner = document.createElement("div");
        inner.className = "card-inner";

        const img = document.createElement("img");
        img.src = cardData.image;
        img.alt = cardData.name;
        img.draggable = false;

        inner.appendChild(img);
        card.appendChild(inner);

        const badge = document.createElement("div");
        badge.className = "card-badge";
        badge.textContent = "×";
        card.appendChild(badge);

        card.addEventListener("click", () => onCardClick(cardData.name));
        cardsGrid.appendChild(card);
      });

      updateCardVisuals();
    }

    function updateCardVisuals() {
      document.querySelectorAll(".card").forEach((el) => {
        const name = el.dataset.cardName;
        const badge = el.querySelector(".card-badge");
        el.classList.remove("selected-must", "selected-bonus");

        if (mustSelected.includes(name)) {
          el.classList.add("selected-must");
          badge.textContent = "필수";
          badge.style.cssText = "width:auto;height:auto;padding:4px 9px;border-radius:999px;font-size:.72rem;";
        } else if (bonusSelected.includes(name)) {
          el.classList.add("selected-bonus");
          badge.textContent = "보너스";
          badge.style.cssText = "width:auto;height:auto;padding:4px 9px;border-radius:999px;font-size:.72rem;";
        } else {
          badge.textContent = "×";
          badge.style.cssText = "";
        }
      });
    }

    function renderSelectedCards() {
      selectedCardsGrid.innerHTML = "";
      selectedStep.textContent = currentStep.toString();

      const allSelected = [
        ...mustSelected.map((n) => ({ name: n, type: "must" })),
        ...bonusSelected.map((n) => ({ name: n, type: "bonus" })),
      ];

      const total = allSelected.length;

      if (total === 0) {
        selectedCardsSection.classList.add("hidden");
        return;
      }

      // 섹션 표시
      selectedCardsSection.classList.remove("hidden");

      // 라벨
      const mustCount = mustSelected.length;
      const bonusCount = bonusSelected.length;
      if (mustCount > 0 && bonusCount > 0) {
        selectedSectionLabel.textContent = `⭐ 필수 ${mustCount}장  +  🎁 보너스 ${bonusCount}장`;
      } else if (mustCount > 0) {
        selectedSectionLabel.textContent = `⭐ 필수 카드 ${mustCount}장`;
      } else {
        selectedSectionLabel.textContent = `🎁 보너스 카드 ${bonusCount}장`;
      }

      // data-count 설정 (1~4열 제어)
      const countAttr = Math.min(total, 4);
      selectedCardsGrid.setAttribute("data-count", countAttr.toString());

      allSelected.forEach(({ name, type }) => {
        const cardData = getCardData(name);
        if (!cardData) return;

        const item = document.createElement("div");
        item.className = "selected-card-item " + (type === "must" ? "must-card" : "bonus-card");

        const img = document.createElement("img");
        img.src = cardData.image;
        img.alt = cardData.name;
        img.draggable = false;
        item.appendChild(img);

        const label = document.createElement("div");
        label.className = "selected-card-label " + type;
        label.textContent = type === "must" ? "필수" : "보너스";
        item.appendChild(label);

        selectedCardsGrid.appendChild(item);
      });
    }

    function onCardClick(name) {
      msg.style.display = "none";

      const inMust = mustSelected.includes(name);
      const inBonus = bonusSelected.includes(name);

      if (currentMode === "must") {
        if (inMust) {
          mustSelected = mustSelected.filter((n) => n !== name);
        } else {
          if (mustSelected.length >= MAX_MUST) {
            alert("필수 카드는 최대 4장까지 선택할 수 있습니다.");
            return;
          }
          mustSelected.push(name);
        }
        bonusSelected = bonusSelected.filter((n) => n !== name);
      } else {
        if (inBonus) {
          bonusSelected = bonusSelected.filter((n) => n !== name);
        } else {
          bonusSelected.push(name);
        }
        mustSelected = mustSelected.filter((n) => n !== name);
      }

      syncUI();
    }

    function syncUI() {
      currentStepSpan.textContent = currentStep.toString();
      totalScoreSpan.textContent = totalScore.toString();
      updateCardVisuals();
      renderSelectedCards();

      if (isFinished) {
        applyScoreBtn.disabled = true;
        applyScoreBtn.textContent = "활동 완료";
        scoreInput.disabled = true;
      } else {
        applyScoreBtn.disabled = false;
        applyScoreBtn.textContent = "점수 반영";
        scoreInput.disabled = false;
      }
    }

    modeMustBtn.addEventListener("click", () => {
      currentMode = "must";
      modeMustBtn.classList.add("active");
      modeBonusBtn.classList.remove("active");
    });

    modeBonusBtn.addEventListener("click", () => {
      currentMode = "bonus";
      modeBonusBtn.classList.add("active");
      modeMustBtn.classList.remove("active");
    });

    applyScoreBtn.addEventListener("click", () => {
      msg.style.display = "none";

      if (isFinished) {
        msg.style.display = "block";
        msg.textContent = "8개 상황이 모두 완료되었습니다. 점수를 더 반영할 수 없습니다.";
        return;
      }

      const value = parseInt(scoreInput.value, 10);
      if (isNaN(value) || value < 0) {
        alert("0 이상의 숫자를 입력해주세요.");
        return;
      }

      if (currentStep === TOTAL_STEPS) {
        const ok = confirm("마지막 상황입니다. 점수를 반영하면 활동이 완료됩니다. 진행할까요?");
        if (!ok) return;
      }

      lastStepSnapshot = {
        step: currentStep,
        score: value,
        must: [...mustSelected],
        bonus: [...bonusSelected],
        finishedBefore: isFinished,
      };

      totalScore += value;

      if (currentStep < TOTAL_STEPS) {
        currentStep += 1;
        mustSelected = [];
        bonusSelected = [];
        scoreInput.value = "0";
      } else {
        isFinished = true;
        mustSelected = [];
        bonusSelected = [];
        scoreInput.value = "0";
        msg.style.display = "block";
        msg.textContent = "활동이 완료되었습니다! 최종 누적 점수를 확인하세요.";
      }

      syncUI();
    });

    backBtn.addEventListener("click", () => {
      if (!lastStepSnapshot) {
        msg.style.display = "block";
        msg.textContent = "되돌릴 이전 문제가 없습니다.";
        return;
      }

      msg.style.display = "none";

      currentStep = lastStepSnapshot.step;
      isFinished = lastStepSnapshot.finishedBefore || false;
      totalScore -= lastStepSnapshot.score;
      if (totalScore < 0) totalScore = 0;

      mustSelected = [...lastStepSnapshot.must];
      bonusSelected = [...lastStepSnapshot.bonus];
      scoreInput.value = String(lastStepSnapshot.score);

      lastStepSnapshot = null;
      syncUI();
    });

    clearBtn.addEventListener("click", () => {
      if (!mustSelected.length && !bonusSelected.length) {
        msg.style.display = "block";
        msg.textContent = "해제할 카드가 없습니다.";
        return;
      }

      if (!confirm("선택한 필수 카드와 보너스 카드를 모두 해제하시겠습니까?")) return;

      mustSelected = [];
      bonusSelected = [];
      msg.style.display = "none";
      syncUI();
    });

    renderCards();
    syncUI();
  </script>
</body>
</html>
